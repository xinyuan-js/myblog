name: myblog

x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  mysql:
    image: myblog-mysql:8.4.10-hardened
    build:
      context: ./deploy/mysql
      args:
        GOSU_COMMIT: 6456aaa0f3c854d199d0f037f068eb97515b7513
    restart: unless-stopped
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci", "--default-time-zone=+00:00", "--mysqlx=0"]
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?set MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: blog
      MYSQL_USER: blog_user
      MYSQL_PASSWORD: ${BLOG_DB_PASSWORD:?set BLOG_DB_PASSWORD}
      ARTALK_DB_PASSWORD: ${ARTALK_DB_PASSWORD:?set ARTALK_DB_PASSWORD}
    volumes:
      - ${DATA_DIR:-./data}/mysql:/var/lib/mysql
      - ./deploy/mysql/init-artalk.sh:/docker-entrypoint-initdb.d/10-artalk.sh:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [backend]
    mem_limit: 600m
    pids_limit: 200
    security_opt: [no-new-privileges:true]
    logging: *default-logging

  minio:
    image: myblog-minio:RELEASE.2025-10-15T17-29-55Z
    build:
      context: ./deploy/minio
      args:
        MINIO_COMMIT: 9e49d5e7a648f00e26f2246f4dc28e6b07f8c84a
        MINIO_SHORT_COMMIT: 9e49d5e7a648
        MINIO_VERSION: "2025-10-15T17:29:55Z"
        MC_COMMIT: 77f82e18b5401a65958f1619df6ebb994634bd88
        MC_SHORT_COMMIT: 77f82e18b540
        MC_VERSION: "2025-11-06T16:25:29Z"
    restart: unless-stopped
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:?set MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:?set MINIO_SECRET_KEY}
      MC_CONFIG_DIR: /tmp/mc
    volumes:
      - ${DATA_DIR:-./data}/minio:/data
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [backend]
    mem_limit: 300m
    pids_limit: 100
    read_only: true
    tmpfs: ["/tmp:size=16m,noexec,nosuid,nodev"]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging: *default-logging

  api:
    build:
      context: ./apps/api
    restart: unless-stopped
    environment:
      APP_ENV: ${APP_ENV:-production}
      HTTP_ADDR: :8080
      TRUSTED_PROXIES: 172.28.0.0/24
      DATABASE_DSN: blog_user:${BLOG_DB_PASSWORD}@tcp(mysql:3306)/blog?charset=utf8mb4&parseTime=true&loc=UTC&multiStatements=true
      APP_ORIGIN: ${APP_ORIGIN:?set APP_ORIGIN}
      GITHUB_CLIENT_ID: ${GITHUB_CLIENT_ID:?set GITHUB_CLIENT_ID}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:?set GITHUB_CLIENT_SECRET}
      ADMIN_GITHUB_ID: ${ADMIN_GITHUB_ID:?set ADMIN_GITHUB_ID}
      GITHUB_CALLBACK_URL: ${APP_ORIGIN}/api/auth/github/callback
      OAUTH_STATE_SECRET: ${OAUTH_STATE_SECRET:?set OAUTH_STATE_SECRET}
      SESSION_COOKIE_NAME: ${SESSION_COOKIE_NAME:-blog_session}
      SESSION_COOKIE_SECURE: ${SESSION_COOKIE_SECURE:-true}
      SESSION_TTL: ${SESSION_TTL:-168h}
      ARTALK_DATABASE_DSN: blog_artalk_bridge:${ARTALK_DB_PASSWORD}@tcp(mysql:3306)/artalk?charset=utf8mb4&parseTime=true&loc=UTC
      ARTALK_INTERNAL_URL: http://artalk:23366
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: blog-media
      MINIO_USE_SSL: "false"
      MEDIA_PUBLIC_URL: /uploads
    depends_on:
      mysql: { condition: service_healthy }
      minio: { condition: service_healthy }
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:8080/api/readyz"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [backend]
    mem_limit: 180m
    pids_limit: 100
    read_only: true
    tmpfs: ["/tmp:size=16m,noexec,nosuid,nodev"]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging: *default-logging

  artalk:
    # Official nightly built from the audited 75a35cc commit. The digest keeps
    # deployments reproducible while stable v2.9.1 remains unpatched.
    image: artalk/artalk-go:nightly@sha256:d6a45fb4c3e45df38808263d95d431fd96917e7bad4aac94c68abfebc6b3ef43
    restart: unless-stopped
    environment:
      ATK_LOCALE: zh-CN
      ATK_SITE_DEFAULT: ${ARTALK_SITE_NAME:-MyBlog}
      ATK_SITE_URL: ${APP_ORIGIN}
      ATK_TRUSTED_DOMAINS: ${APP_ORIGIN}
      ATK_APP_KEY: ${ARTALK_APP_KEY:?set ARTALK_APP_KEY}
      ATK_DB_TYPE: mysql
      ATK_DB_DSN: artalk_user:${ARTALK_DB_PASSWORD}@tcp(mysql:3306)/artalk?charset=utf8mb4&parseTime=true&loc=UTC
      ATK_HTTP_PROXY_HEADER: X-Forwarded-For
      ATK_HTTP_BODY_LIMIT: "10"
      ATK_MODERATOR_PENDING_DEFAULT: "true"
      ATK_CAPTCHA_ENABLED: "true"
      ATK_CAPTCHA_ACTION_LIMIT: "3"
      # Artalk trusts the short-lived identity issued by the Gin session.
      # Every GitHub user may comment; the owner and delegated blog admins are moderators.
      ATK_AUTH_ENABLED: "true"
      ATK_AUTH_ANONYMOUS: "false"
      ATK_AUTH_EMAIL_ENABLED: "false"
      ATK_AUTH_GITHUB_ENABLED: "false"
      ATK_AUTH_SSO_ENABLED: "true"
      ATK_AUTH_SSO_ISSUER: http://api:8080/internal/artalk-oidc
      # Blog media is managed by the authenticated Gin/MinIO pipeline. Keep
      # anonymous comment attachments disabled to reduce abuse and backup gaps.
      ATK_IMG_UPLOAD_ENABLED: "false"
    depends_on:
      mysql: { condition: service_healthy }
    volumes:
      - ${DATA_DIR:-./data}/artalk:/data
    networks: [backend]
    mem_limit: 220m
    pids_limit: 100
    read_only: true
    tmpfs: ["/tmp:size=16m,noexec,nosuid,nodev"]
    cap_drop: [ALL]
    security_opt: [no-new-privileges:true]
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1:23366/api/v2/conf"]
      interval: 10s
      timeout: 5s
      retries: 12

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        VITE_ARTALK_SITE: ${ARTALK_SITE_NAME:-MyBlog}
    restart: unless-stopped
    depends_on:
      api: { condition: service_healthy }
      artalk: { condition: service_healthy }
    ports:
      - "${HTTP_PORT:-80}:80"
    networks: [backend]
    mem_limit: 80m
    pids_limit: 100
    security_opt: [no-new-privileges:true]
    logging: *default-logging

networks:
  backend:
    ipam:
      config:
        - subnet: 172.28.0.0/24
