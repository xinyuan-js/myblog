limit_req_zone $binary_remote_addr zone=blog_api_per_ip:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=blog_comments_per_ip:10m rate=5r/s;
log_format myblog_no_query '$remote_addr - $remote_user [$time_local] '
                           '"$request_method $uri $server_protocol" $status $body_bytes_sent '
                           '"$http_user_agent"';

server {
    listen 80;
    server_name ${NGINX_SERVER_NAME};
    access_log /var/log/nginx/access.log myblog_no_query;
    if ($host != ${NGINX_SERVER_NAME}) { return 444; }
    return 308 https://${NGINX_SERVER_NAME}$request_uri;
}

server {
    listen 443 ssl default_server;
    http2 on;
    server_name ${NGINX_SERVER_NAME};
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 11m;
    access_log /var/log/nginx/access.log myblog_no_query;
    if ($host != ${NGINX_SERVER_NAME}) { return 444; }

    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self' https://github.com; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self' https://cdn.jsdelivr.net;" always;

    location /api/ {
        limit_req zone=blog_api_per_ip burst=40 nodelay;
        limit_req_status 429;
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_read_timeout 30s;
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
    }
    location ^~ /comments/ {
        limit_req zone=blog_comments_per_ip burst=20 nodelay;
        limit_req_status 429;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header Referrer-Policy "no-referrer" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'self'; object-src 'none'; form-action 'self'; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';" always;
        # Keep the published Artalk 2.9.1 client compatible with the audited
        # nightly server's /votes/{target}/{id}/{choice} route.
        rewrite ^/comments/api/v2/votes/(comment|page)_(up|down)/([0-9]+)$ /api/v2/votes/$1/$3/$2 break;
        proxy_pass http://artalk:23366/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
    }
    location ^~ /uploads/ {
        limit_except GET { deny all; }
        proxy_pass http://minio:9000/blog-media/;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Xss-Protection;
        proxy_hide_header X-Ratelimit-Limit;
        proxy_hide_header X-Ratelimit-Remaining;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 1y;
    }
    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|webp|svg)$ {
        expires 30d;
        try_files $uri =404;
    }
    location / { try_files $uri $uri/ /index.html; }
}
