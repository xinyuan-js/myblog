server {
    listen 80 default_server;
    server_name _;
    server_tokens off;
    root /usr/share/nginx/html;
    index index.html;
    client_max_body_size 11m;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; frame-ancestors 'none'; object-src 'none'; form-action 'self' https://github.com; img-src 'self' data: https:; font-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self';" always;

    location /api/ {
        proxy_pass http://api:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        # The API sets strict JSON-only headers itself. Hide duplicates and let
        # this public gateway apply the site-wide policy exactly once.
        proxy_hide_header X-Content-Type-Options;
        proxy_hide_header X-Frame-Options;
        proxy_hide_header Referrer-Policy;
        proxy_hide_header Permissions-Policy;
        proxy_hide_header Content-Security-Policy;
    }

    # Artalk serves JavaScript/CSS below this prefix.  ^~ prevents the generic
    # static-file regex below from intercepting those requests.
    location ^~ /comments/ {
        proxy_pass http://artalk:23366/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media is immutable and publicly readable, but MinIO's management API is
    # never exposed.  ^~ is required so image extensions do not hit the SPA's
    # static-file location.
    location ^~ /uploads/ {
        limit_except GET { deny all; }
        proxy_pass http://minio:9000/blog-media/;
        proxy_set_header Host minio:9000;
        proxy_hide_header x-amz-request-id;
        proxy_hide_header x-amz-id-2;
        proxy_hide_header Strict-Transport-Security;
        proxy_hide_header X-Xss-Protection;
        proxy_hide_header X-Ratelimit-Limit;
        proxy_hide_header X-Ratelimit-Remaining;
        proxy_hide_header Cache-Control;
        proxy_hide_header Expires;
        expires 1y;
    }

    location ~* \.(?:css|js|woff2?|png|jpg|jpeg|gif|webp|svg)$ {
        expires 30d;
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
