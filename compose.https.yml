services:
  web:
    ports:
      - "443:443"
    volumes:
      - ./deploy/nginx/https.conf:/etc/nginx/conf.d/default.conf:ro
      # Mount the resolved certificate files, not Let's Encrypt's live/
      # directory whose ../../archive symlinks would be broken in-container.
      - ${TLS_FULLCHAIN_FILE:?set TLS_FULLCHAIN_FILE}:/etc/nginx/certs/fullchain.pem:ro
      - ${TLS_PRIVATE_KEY_FILE:?set TLS_PRIVATE_KEY_FILE}:/etc/nginx/certs/privkey.pem:ro
